# fly.toml — Fly.io deployment configuration
# Deploy: fly launch / fly deploy

app = "dotacafe"
primary_region = "mia"  # Miami — closest to LATAM

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  HOST = "0.0.0.0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
