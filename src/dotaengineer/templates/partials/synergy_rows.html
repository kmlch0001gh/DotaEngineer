{% for r in rows %}
<tr>
    <td style="font-family:var(--serif);font-size:14px;"><a href="/players/{{ r.player_id }}">{{ r.display_name }}</a></td>
    <td class="num" style="text-align:right;color:var(--ink-1);">{{ r.games }}</td>
    <td class="num" style="text-align:right;font-size:12px;"><span style="color:var(--radiant);">{{ r.wins }}</span>/<span style="color:#ffaaa0;">{{ r.losses }}</span></td>
    <td class="num" style="text-align:right;color:{% if r.win_rate >= 50 %}var(--radiant){% else %}#ffaaa0{% endif %};">{{ r.win_rate }}%</td>
</tr>
{% endfor %}
