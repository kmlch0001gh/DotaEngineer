{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div style="text-align:center;margin-top:80px;max-width:400px;margin-left:auto;margin-right:auto;">
    <div style="font-family:var(--serif);font-size:96px;color:var(--emerald-soft);line-height:1;">{{ code }}</div>
    <p style="color:var(--ink-2);margin-top:16px;font-size:16px;">{{ message }}</p>
    <a href="/" class="btn btn-primary" style="margin-top:24px;">Volver al inicio</a>
</div>
{% endblock %}
