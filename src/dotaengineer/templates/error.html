{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="card text-center" style="margin-top: 3rem; max-width: 400px; margin-left: auto; margin-right: auto;">
    <div class="stat-value" style="font-size: 3rem;">{{ code }}</div>
    <p class="text-secondary mt-2">{{ message }}</p>
    <a href="/" class="btn btn-primary mt-4">Volver al inicio</a>
</div>
{% endblock %}
