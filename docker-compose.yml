services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dota
      POSTGRES_PASSWORD: dota
      POSTGRES_DB: dotaengineer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dota"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:2-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
